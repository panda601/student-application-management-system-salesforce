<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <!-- Background -->
  <rect width="500" height="400" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="2" />

  <!-- Header -->
  <rect width="500" height="60" rx="10" fill="#1e293b" />
  <!-- Einstein Icon -->
  <circle cx="30" cy="30" r="12" fill="#8b5cf6" />
  <text x="30" y="34" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">E</text>
  <text x="55" y="36" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#ffffff">SAMS Einstein AI Insights</text>

  <!-- Left Circle Progress Gauge -->
  <g transform="translate(40, 110)">
    <circle cx="80" cy="80" r="60" fill="none" stroke="#1e293b" stroke-width="12" />
    <!-- 85% Arc (circumference 377, stroke-dashoffset = 377 * 0.15 = 56.5) -->
    <circle cx="80" cy="80" r="60" fill="none" stroke="#10b981" stroke-width="12" stroke-dasharray="377" stroke-dashoffset="56" stroke-linecap="round" transform="rotate(-90, 80, 80)" />
    
    <text x="80" y="85" font-family="'Outfit', 'Inter', sans-serif" font-size="28" font-weight="800" fill="#10b981" text-anchor="middle">85%</text>
    <text x="80" y="165" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#94a3b8" text-anchor="middle">Approval Likelihood</text>
  </g>

  <!-- Right: Insights List -->
  <g transform="translate(240, 100)">
    <!-- Risk Level -->
    <text x="0" y="25" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8">Predicted Dropout Risk:</text>
    <rect x="150" y="10" width="80" height="22" rx="11" fill="#064e3b" />
    <text x="190" y="25" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#34d399" text-anchor="middle">Low Risk</text>
    
    <line x1="0" y1="45" x2="230" y2="45" stroke="#1e293b" stroke-width="1" />

    <!-- Action Checklist -->
    <text x="0" y="75" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#ffffff">Recommended Actions:</text>
    
    <!-- Rec 1 -->
    <circle cx="10" cy="105" r="6" fill="#f59e0b" />
    <text x="25" y="109" font-family="'Inter', sans-serif" font-size="12" fill="#e2e8f0">Verify Visa copy</text>
    <text x="25" y="123" font-family="'Inter', sans-serif" font-size="10" fill="#64748b">(Applicant is International)</text>

    <!-- Rec 2 -->
    <circle cx="10" cy="155" r="6" fill="#f59e0b" />
    <text x="25" y="159" font-family="'Inter', sans-serif" font-size="12" fill="#e2e8f0">Collect Parental Consent</text>
    <text x="25" y="173" font-family="'Inter', sans-serif" font-size="10" fill="#64748b">(Applicant age is under 18)</text>

    <!-- Rec 3 -->
    <circle cx="10" cy="205" r="6" fill="#10b981" />
    <text x="25" y="209" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8">Transcripts verified</text>
  </g>
</svg>
