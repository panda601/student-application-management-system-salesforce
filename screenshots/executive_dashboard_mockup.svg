<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="500" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="2" />

  <!-- Top Bar -->
  <rect width="800" height="60" rx="10" fill="#1e293b" />
  <circle cx="25" cy="30" r="6" fill="#ef4444" />
  <circle cx="41" cy="30" r="6" fill="#eab308" />
  <circle cx="57" cy="30" r="6" fill="#22c55e" />
  <text x="400" y="38" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">SAMS - Executive Analytics Console</text>

  <!-- Metrics Row -->
  <g transform="translate(30, 80)">
    <!-- Tile 1 -->
    <rect width="165" height="80" rx="8" fill="#1e293b" stroke="#334155" />
    <text x="15" y="25" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#94a3b8">TOTAL STUDENTS</text>
    <text x="15" y="60" font-family="'Outfit', 'Inter', sans-serif" font-size="28" font-weight="800" fill="#ffffff">1,248</text>
    <text x="155" y="60" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#10b981" text-anchor="end">↑ 12%</text>

    <!-- Tile 2 -->
    <rect x="190" width="165" height="80" rx="8" fill="#1e293b" stroke="#334155" />
    <text x="205" y="25" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#94a3b8">TOTAL APPLICATIONS</text>
    <text x="205" y="60" font-family="'Outfit', 'Inter', sans-serif" font-size="28" font-weight="800" fill="#ffffff">1,480</text>
    <text x="345" y="60" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#38bdf8" text-anchor="end">Active</text>

    <!-- Tile 3 -->
    <rect x="380" width="165" height="80" rx="8" fill="#1e293b" stroke="#334155" />
    <text x="395" y="25" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#94a3b8">REVENUE COLLECTED</text>
    <text x="395" y="60" font-family="'Outfit', 'Inter', sans-serif" font-size="28" font-weight="800" fill="#22c55e">$1.24M</text>
    <text x="535" y="60" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#22c55e" text-anchor="end">Target</text>

    <!-- Tile 4 -->
    <rect x="570" width="170" height="80" rx="8" fill="#1e293b" stroke="#334155" />
    <text x="585" y="25" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#94a3b8">OUTSTANDING BALANCE</text>
    <text x="585" y="60" font-family="'Outfit', 'Inter', sans-serif" font-size="28" font-weight="800" fill="#ef4444">$185.6K</text>
    <text x="725" y="60" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#ef4444" text-anchor="end">Collect</text>
  </g>

  <!-- Charts Panel -->
  <g transform="translate(30, 190)">
    <!-- Chart Box 1 (Donut Chart) -->
    <rect width="355" height="280" rx="8" fill="#1e293b" stroke="#334155" />
    <text x="20" y="30" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#ffffff">Application Status Breakdown</text>
    
    <!-- SVG Donut -->
    <circle cx="120" cy="150" r="60" fill="none" stroke="#0f172a" stroke-width="20" />
    <circle cx="120" cy="150" r="60" fill="none" stroke="#3b82f6" stroke-width="20" stroke-dasharray="377" stroke-dashoffset="100" />
    <circle cx="120" cy="150" r="60" fill="none" stroke="#f59e0b" stroke-width="20" stroke-dasharray="377" stroke-dashoffset="240" />
    <circle cx="120" cy="150" r="60" fill="none" stroke="#10b981" stroke-width="20" stroke-dasharray="377" stroke-dashoffset="310" />
    <text x="120" y="155" font-family="'Inter', sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Statuses</text>

    <!-- Legend -->
    <g transform="translate(210, 80)">
      <rect width="12" height="12" fill="#3b82f6" />
      <text x="22" y="11" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8">New (30%)</text>

      <rect y="30" width="12" height="12" fill="#f59e0b" />
      <text x="22" y="41" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8">In Review (45%)</text>

      <rect y="60" width="12" height="12" fill="#10b981" />
      <text x="22" y="71" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8">Approved (20%)</text>

      <rect y="90" width="12" height="12" fill="#ef4444" />
      <text x="22" y="101" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8">Rejected (5%)</text>
    </g>

    <!-- Chart Box 2 (Bar Chart) -->
    <rect x="385" width="355" height="280" rx="8" fill="#1e293b" stroke="#334155" />
    <text x="405" y="30" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#ffffff">Monthly Revenue Collections</text>
    
    <!-- Graph -->
    <rect x="425" y="160" width="30" height="80" rx="4" fill="#10b981" />
    <text x="440" y="255" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Apr</text>

    <rect x="485" y="120" width="30" height="120" rx="4" fill="#10b981" />
    <text x="500" y="255" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">May</text>

    <rect x="545" y="90" width="30" height="150" rx="4" fill="#8b5cf6" />
    <text x="560" y="255" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Jun</text>

    <rect x="605" y="60" width="30" height="180" rx="4" fill="#8b5cf6" />
    <text x="620" y="255" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Jul</text>

    <line x1="405" y1="240" x2="720" y2="240" stroke="#334155" stroke-width="2" />
  </g>
</svg>
