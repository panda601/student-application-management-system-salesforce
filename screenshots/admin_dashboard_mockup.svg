<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="500" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="2" />
  
  <!-- Header Bar -->
  <rect width="800" height="60" rx="10" fill="#1e293b" />
  <circle cx="25" cy="30" r="6" fill="#ef4444" />
  <circle cx="41" cy="30" r="6" fill="#eab308" />
  <circle cx="57" cy="30" r="6" fill="#22c55e" />
  <text x="400" y="38" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">SAMS - Student Directory Console</text>

  <!-- Sidebar -->
  <rect x="0" y="60" width="200" height="440" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
  <rect x="15" y="80" width="170" height="36" rx="6" fill="#3b82f6" opacity="0.15" />
  <text x="30" y="103" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#3b82f6">All Students</text>
  <text x="30" y="150" font-family="'Inter', sans-serif" font-size="14" fill="#94a3b8">Active Applications</text>
  <text x="30" y="200" font-family="'Inter', sans-serif" font-size="14" fill="#94a3b8">Payment Ledger</text>
  <text x="30" y="250" font-family="'Inter', sans-serif" font-size="14" fill="#94a3b8">Document Verifications</text>
  <text x="30" y="300" font-family="'Inter', sans-serif" font-size="14" fill="#94a3b8">Analytics &amp; Reports</text>
  <text x="30" y="350" font-family="'Inter', sans-serif" font-size="14" fill="#94a3b8">System Settings</text>

  <!-- Main Panel -->
  <g transform="translate(220, 80)">
    <!-- Title -->
    <text x="0" y="25" font-family="'Inter', sans-serif" font-size="22" font-weight="700" fill="#ffffff">Student Records</text>
    
    <!-- Controls (Search & Filter) -->
    <rect x="0" y="45" width="350" height="36" rx="6" fill="#1e293b" stroke="#334155" />
    <text x="15" y="67" font-family="'Inter', sans-serif" font-size="12" fill="#64748b">Search by name, ID or email...</text>
    
    <rect x="370" y="45" width="170" height="36" rx="6" fill="#1e293b" stroke="#334155" />
    <text x="385" y="67" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8">Status: All Active</text>
    
    <!-- Table Header -->
    <rect x="0" y="100" width="560" height="36" rx="4" fill="#1e293b" />
    <text x="15" y="122" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#94a3b8">STUDENT ID</text>
    <text x="140" y="122" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#94a3b8">NAME</text>
    <text x="300" y="122" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#94a3b8">EMAIL</text>
    <text x="480" y="122" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#94a3b8">STATUS</text>

    <!-- Table Rows -->
    <!-- Row 1 -->
    <line x1="0" y1="175" x2="560" y2="175" stroke="#1e293b" stroke-width="1" />
    <text x="15" y="160" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#38bdf8">SAMS-2026-0001</text>
    <text x="140" y="160" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#f8fafc">Sarah Jenkins</text>
    <text x="300" y="160" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8">s.jenkins@example.com</text>
    <rect x="480" y="145" width="60" height="20" rx="10" fill="#065f46" />
    <text x="510" y="159" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="#34d399" text-anchor="middle">Active</text>

    <!-- Row 2 -->
    <line x1="0" y1="215" x2="560" y2="215" stroke="#1e293b" stroke-width="1" />
    <text x="15" y="200" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#38bdf8">SAMS-2026-0002</text>
    <text x="140" y="200" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#f8fafc">John Doe</text>
    <text x="300" y="200" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8">j.doe@example.com</text>
    <rect x="480" y="185" width="60" height="20" rx="10" fill="#065f46" />
    <text x="510" y="199" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="#34d399" text-anchor="middle">Active</text>

    <!-- Row 3 -->
    <line x1="0" y1="255" x2="560" y2="255" stroke="#1e293b" stroke-width="1" />
    <text x="15" y="240" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#38bdf8">SAMS-2026-0003</text>
    <text x="140" y="240" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#f8fafc">Amelie Dupont</text>
    <text x="300" y="240" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8">a.dupont@example.com</text>
    <rect x="480" y="225" width="60" height="20" rx="10" fill="#78350f" />
    <text x="510" y="239" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="#fbbf24" text-anchor="middle">Inactive</text>
  </g>
</svg>
