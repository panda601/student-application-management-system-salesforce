<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="400" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="2" />

  <!-- Header -->
  <rect width="800" height="60" rx="10" fill="#1e293b" />
  <text x="30" y="38" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="#ffffff">Document Checklist &amp; Verification</text>
  <text x="770" y="36" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8" text-anchor="end">Verification Status</text>

  <!-- Document List -->
  <g transform="translate(30, 80)">
    <!-- Doc Row 1 -->
    <rect width="740" height="80" rx="8" fill="#111827" stroke="#1e293b" />
    <text x="20" y="35" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#ffffff">Academic Transcript</text>
    <text x="20" y="55" font-family="'Inter', sans-serif" font-size="12" fill="#64748b">Official copy of high school or university grades</text>
    
    <rect x="420" y="27" width="90" height="24" rx="12" fill="#065f46" />
    <text x="465" y="43" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#34d399" text-anchor="middle">Verified</text>

    <!-- Preview & Upload buttons -->
    <rect x="540" y="24" width="80" height="30" rx="4" fill="#1e293b" stroke="#334155" />
    <text x="580" y="43" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Preview</text>

    <rect x="640" y="24" width="80" height="30" rx="4" fill="#3b82f6" />
    <text x="680" y="43" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Upload</text>

    <!-- Doc Row 2 -->
    <g transform="translate(0, 100)">
      <rect width="740" height="80" rx="8" fill="#111827" stroke="#1e293b" />
      <text x="20" y="35" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#ffffff">Passport Copy</text>
      <text x="20" y="55" font-family="'Inter', sans-serif" font-size="12" fill="#64748b">Biographical page showing name and date of birth</text>
      
      <rect x="420" y="27" width="130" height="24" rx="12" fill="#78350f" />
      <text x="485" y="43" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#fbbf24" text-anchor="middle">Pending Verification</text>

      <rect x="560" y="24" width="80" height="30" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1" />
      <text x="600" y="43" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Preview</text>

      <rect x="650" y="24" width="70" height="30" rx="4" fill="#1e293b" stroke="#334155" />
      <text x="685" y="43" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle">Re-upload</text>
    </g>

    <!-- Doc Row 3 -->
    <g transform="translate(0, 200)">
      <rect width="740" height="80" rx="8" fill="#111827" stroke="#1e293b" />
      <text x="20" y="35" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#ffffff">English Proficiency Proof</text>
      <text x="20" y="55" font-family="'Inter', sans-serif" font-size="12" fill="#64748b">TOEFL, IELTS, or Duolingo English score report</text>
      
      <rect x="420" y="27" width="90" height="24" rx="12" fill="#7f1d1d" />
      <text x="465" y="43" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#f87171" text-anchor="middle">Missing</text>

      <!-- Upload Button (No Preview) -->
      <rect x="640" y="24" width="80" height="30" rx="4" fill="#3b82f6" />
      <text x="680" y="43" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Upload</text>
    </g>
  </g>
</svg>
