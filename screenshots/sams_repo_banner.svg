<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="60%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>
    <linearGradient id="buttonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />
  
  <!-- Abstract Design Wave -->
  <path d="M 700 0 Q 850 150 1200 200 L 1200 0 Z" fill="#ffffff" opacity="0.03" />
  <path d="M 800 400 Q 950 250 1200 300 L 1200 400 Z" fill="#ffffff" opacity="0.03" />

  <!-- Left Side: Title & Branding -->
  <g transform="translate(80, 0)">
    <!-- Logo Icon -->
    <g transform="translate(0, 75)">
      <!-- Cloud -->
      <path d="M 20 40 A 15 15 0 0 1 20 10 A 20 20 0 0 1 50 0 A 18 18 0 0 1 76 13 A 15 15 0 0 1 76 40 Z" 
            fill="none" stroke="url(#accentGrad)" stroke-width="4" stroke-linejoin="round" />
      <!-- Cap -->
      <polygon points="30,22 48,12 66,22 48,32" fill="url(#accentGrad)" />
      <path d="M 38,27 L 38,33 A 10 5 0 0 0 58,33 L 58,27" fill="none" stroke="url(#accentGrad)" stroke-width="2" />
    </g>

    <!-- Project Title -->
    <text x="100" y="115" font-family="'Outfit', 'Inter', sans-serif" font-size="54" font-weight="900" fill="#ffffff" letter-spacing="1">SAMS</text>
    <text x="0" y="180" font-family="'Inter', sans-serif" font-size="28" font-weight="700" fill="#f8fafc">Student Application Management System</text>
    
    <!-- Short Desc -->
    <text x="0" y="225" font-family="'Inter', sans-serif" font-size="16" fill="#94a3b8">An Enterprise Salesforce CRM Solution for Admissions, Payment Compliance,</text>
    <text x="0" y="250" font-family="'Inter', sans-serif" font-size="16" fill="#94a3b8">Document Verifications, and Einstein AI Predictive Scoring.</text>

    <!-- Badge Pills -->
    <g transform="translate(0, 285)">
      <!-- LWC Badge -->
      <rect width="90" height="28" rx="14" fill="#1e293b" stroke="#334155" />
      <text x="45" y="19" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#38bdf8" text-anchor="middle">Lightning UI</text>

      <!-- Apex Badge -->
      <rect x="105" width="80" height="28" rx="14" fill="#1e293b" stroke="#334155" />
      <text x="145" y="19" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#a855f7" text-anchor="middle">Apex logic</text>

      <!-- Flow Badge -->
      <rect x="200" width="105" height="28" rx="14" fill="#1e293b" stroke="#334155" />
      <text x="252" y="19" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#34d399" text-anchor="middle">Flow Builder</text>
    </g>
  </g>

  <!-- Right Side: Graphic UI Mockup Grid -->
  <g transform="translate(750, 60)">
    <!-- Main UI Card Container -->
    <rect x="0" y="0" width="370" height="280" rx="16" fill="#1e293b" stroke="#334155" stroke-width="2" />
    
    <!-- Header Bar inside Mockup -->
    <rect x="0" y="0" width="370" height="45" rx="16" fill="#0f172a" clip-path="polygon(0 0, 370 0, 370 45, 0 45)" />
    <circle cx="20" cy="22" r="6" fill="#ef4444" />
    <circle cx="36" cy="22" r="6" fill="#eab308" />
    <circle cx="52" cy="22" r="6" fill="#22c55e" />
    <text x="185" y="27" font-family="'Inter', sans-serif" font-size="12" font-weight="500" fill="#64748b" text-anchor="middle">SAMS Executive Console</text>
    
    <!-- Balance KPI Tiles -->
    <rect x="20" y="65" width="100" height="60" rx="8" fill="#0f172a" stroke="#334155" />
    <text x="70" y="85" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Tuition Collected</text>
    <text x="70" y="110" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">$1.2M</text>

    <rect x="135" y="65" width="100" height="60" rx="8" fill="#0f172a" stroke="#334155" />
    <text x="185" y="85" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Total Applications</text>
    <text x="185" y="110" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#38bdf8" text-anchor="middle">1,480</text>

    <rect x="250" y="65" width="100" height="60" rx="8" fill="#0f172a" stroke="#334155" />
    <text x="300" y="85" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Approval Rate</text>
    <text x="300" y="110" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#a855f7" text-anchor="middle">85%</text>

    <!-- Mini Chart SVG -->
    <rect x="20" y="145" width="330" height="110" rx="8" fill="#0f172a" stroke="#334155" />
    <!-- Bar Graph -->
    <rect x="40" y="210" width="25" height="30" rx="3" fill="#3b82f6" />
    <rect x="80" y="180" width="25" height="60" rx="3" fill="#3b82f6" />
    <rect x="120" y="165" width="25" height="75" rx="3" fill="#8b5cf6" />
    <rect x="160" y="195" width="25" height="45" rx="3" fill="#3b82f6" />
    <rect x="200" y="170" width="25" height="70" rx="3" fill="#8b5cf6" />
    <rect x="240" y="160" width="25" height="80" rx="3" fill="#22c55e" />
    <rect x="280" y="185" width="25" height="55" rx="3" fill="#22c55e" />
    
    <!-- Baseline -->
    <line x1="30" y1="240" x2="340" y2="240" stroke="#334155" stroke-width="2" />
  </g>
</svg>
