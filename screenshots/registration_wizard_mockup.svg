<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="500" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="2" />

  <!-- Header -->
  <rect width="800" height="70" rx="10" fill="#1e293b" />
  <text x="30" y="32" font-family="'Inter', sans-serif" font-size="18" font-weight="700" fill="#ffffff">Admissions Registry Wizard</text>
  <text x="30" y="52" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8">Register students, programs, and deposits in a single workflow.</text>

  <!-- Progress Bar (Timeline Stepper) -->
  <g transform="translate(30, 95)">
    <line x1="60" y1="20" x2="680" y2="20" stroke="#334155" stroke-width="3" />
    <line x1="60" y1="20" x2="260" y2="20" stroke="#3b82f6" stroke-width="3" />
    
    <!-- Circle 1 (Completed) -->
    <circle cx="60" cy="20" r="14" fill="#3b82f6" />
    <text x="60" y="24" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">✓</text>
    <text x="60" y="48" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#38bdf8" text-anchor="middle">Student Info</text>

    <!-- Circle 2 (Active) -->
    <circle cx="260" cy="20" r="14" fill="#3b82f6" stroke="#0f172a" stroke-width="3" />
    <circle cx="260" cy="20" r="7" fill="#ffffff" />
    <text x="260" y="48" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Course Config</text>

    <!-- Circle 3 (Pending) -->
    <circle cx="480" cy="20" r="14" fill="#1e293b" stroke="#334155" stroke-width="2" />
    <text x="480" y="24" font-family="'Inter', sans-serif" font-size="11" font-weight="700" fill="#94a3b8" text-anchor="middle">3</text>
    <text x="480" y="48" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Payments</text>

    <!-- Circle 4 (Pending) -->
    <circle cx="680" cy="20" r="14" fill="#1e293b" stroke="#334155" stroke-width="2" />
    <text x="680" y="24" font-family="'Inter', sans-serif" font-size="11" font-weight="700" fill="#94a3b8" text-anchor="middle">4</text>
    <text x="680" y="48" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Review</text>
  </g>

  <!-- Form Body -->
  <g transform="translate(30, 180)">
    <rect width="740" height="230" rx="8" fill="#111827" stroke="#1e293b" />
    <text x="30" y="35" font-family="'Inter', sans-serif" font-size="15" font-weight="700" fill="#ffffff">Course Configurations</text>
    
    <!-- Left Field -->
    <text x="30" y="75" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Applied Program / Course *</text>
    <rect x="30" y="85" width="320" height="36" rx="6" fill="#1e293b" stroke="#334155" />
    <text x="45" y="107" font-family="'Inter', sans-serif" font-size="13" fill="#ffffff">Computer Science</text>
    
    <text x="30" y="155" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Application Level (Record Type) *</text>
    <rect x="30" y="165" width="320" height="36" rx="6" fill="#1e293b" stroke="#334155" />
    <text x="45" y="187" font-family="'Inter', sans-serif" font-size="13" fill="#ffffff">Undergraduate</text>

    <!-- Right Field -->
    <text x="390" y="75" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Target Academic Intake *</text>
    <rect x="390" y="85" width="320" height="36" rx="6" fill="#1e293b" stroke="#334155" />
    <text x="405" y="107" font-family="'Inter', sans-serif" font-size="13" fill="#ffffff">Fall 2026</text>
    
    <text x="390" y="155" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Standard Tuition Fee ($) *</text>
    <rect x="390" y="165" width="320" height="36" rx="6" fill="#1e293b" stroke="#334155" />
    <text x="405" y="187" font-family="'Inter', sans-serif" font-size="13" fill="#ffffff">10,000.00</text>
  </g>

  <!-- Controls Footer -->
  <g transform="translate(30, 430)">
    <rect width="740" height="50" rx="8" fill="#1e293b" />
    <!-- Back Button -->
    <rect x="20" y="10" width="100" height="30" rx="4" fill="#334155" />
    <text x="70" y="29" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">← Previous</text>
    
    <!-- Next Button -->
    <rect x="620" y="10" width="100" height="30" rx="4" fill="#3b82f6" />
    <text x="670" y="29" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Next →</text>
  </g>
</svg>
