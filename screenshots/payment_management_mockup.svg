<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="500" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="2" />

  <!-- Header -->
  <rect width="800" height="60" rx="10" fill="#1e293b" />
  <text x="30" y="38" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="#ffffff">Payment Management</text>
  <text x="770" y="36" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8" text-anchor="end">Application: APP-0001</text>

  <!-- KPI Tiles -->
  <g transform="translate(30, 80)">
    <!-- Tuition Fee -->
    <rect width="220" height="70" rx="8" fill="#1e293b" stroke="#334155" />
    <text x="20" y="25" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#94a3b8">COURSE FEE</text>
    <text x="20" y="55" font-family="'Outfit', 'Inter', sans-serif" font-size="24" font-weight="800" fill="#38bdf8">$10,000.00</text>

    <!-- Paid Amount -->
    <rect x="260" width="220" height="70" rx="8" fill="#1e293b" stroke="#334155" />
    <text x="280" y="25" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#94a3b8">PAID AMOUNT</text>
    <text x="280" y="55" font-family="'Outfit', 'Inter', sans-serif" font-size="24" font-weight="800" fill="#22c55e">$7,500.00</text>

    <!-- Outstanding Balance -->
    <rect x="520" width="220" height="70" rx="8" fill="#1e293b" stroke="#334155" />
    <text x="540" y="25" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#94a3b8">OUTSTANDING BALANCE</text>
    <text x="540" y="55" font-family="'Outfit', 'Inter', sans-serif" font-size="24" font-weight="800" fill="#ef4444">$2,500.00</text>
  </g>

  <!-- Split Panel -->
  <!-- Left: Log Payment Form -->
  <g transform="translate(30, 175)">
    <rect width="320" height="300" rx="8" fill="#111827" stroke="#1e293b" />
    <text x="20" y="30" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#ffffff">Record New Deposit</text>
    
    <text x="20" y="70" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#94a3b8">Payment Amount ($) *</text>
    <rect x="20" y="80" width="280" height="36" rx="6" fill="#1e293b" stroke="#334155" />
    <text x="35" y="102" font-family="'Inter', sans-serif" font-size="13" fill="#ffffff">2,500.00</text>

    <text x="20" y="145" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#94a3b8">Payment Method *</text>
    <rect x="20" y="155" width="280" height="36" rx="6" fill="#1e293b" stroke="#334155" />
    <text x="35" y="177" font-family="'Inter', sans-serif" font-size="13" fill="#ffffff">Credit Card</text>

    <!-- Post Payment button -->
    <rect x="20" y="230" width="280" height="38" rx="6" fill="#3b82f6" />
    <text x="160" y="254" font-family="'Inter', sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Post Tuition Payment</text>
  </g>

  <!-- Right: Transaction Ledger -->
  <g transform="translate(380, 175)">
    <rect width="390" height="300" rx="8" fill="#111827" stroke="#1e293b" />
    <text x="20" y="30" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#ffffff">Transaction History</text>
    
    <!-- Table Header -->
    <rect x="20" y="55" width="350" height="30" fill="#1e293b" rx="4" />
    <text x="30" y="74" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#94a3b8">REF ID</text>
    <text x="130" y="74" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#94a3b8">AMOUNT</text>
    <text x="220" y="74" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#94a3b8">METHOD</text>
    <text x="300" y="74" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#94a3b8">STATUS</text>

    <!-- Row 1 -->
    <text x="30" y="115" font-family="'Inter', sans-serif" font-size="12" fill="#38bdf8">PAY-0001</text>
    <text x="130" y="115" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#ffffff">$5,000.00</text>
    <text x="220" y="115" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8">Bank Transfer</text>
    <rect x="300" y="100" width="60" height="18" rx="9" fill="#065f46" />
    <text x="330" y="113" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="#34d399" text-anchor="middle">Completed</text>
    
    <line x1="20" y1="135" x2="370" y2="135" stroke="#1e293b" stroke-width="1" />

    <!-- Row 2 -->
    <text x="30" y="165" font-family="'Inter', sans-serif" font-size="12" fill="#38bdf8">PAY-0002</text>
    <text x="130" y="165" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#ffffff">$2,500.00</text>
    <text x="220" y="165" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8">Credit Card</text>
    <rect x="300" y="150" width="60" height="18" rx="9" fill="#065f46" />
    <text x="330" y="163" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="#34d399" text-anchor="middle">Completed</text>
  </g>
</svg>
