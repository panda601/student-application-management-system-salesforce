<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>
    <!-- Icon Gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
    <!-- Shadow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="30" fill="url(#bgGrad)" />

  <g transform="translate(100, 80)">
    <!-- Cloud base (Salesforce platform symbol) -->
    <path d="M 120 180 
             A 45 45 0 0 1 120 100 
             A 60 60 0 0 1 210 60 
             A 55 55 0 0 1 290 100
             A 45 45 0 0 1 290 180 
             Z" 
          fill="none" stroke="url(#primaryGrad)" stroke-width="8" stroke-linejoin="round" filter="url(#glow)" />

    <!-- Graduation Cap (Admissions/Student symbol) -->
    <!-- Cap Diamond -->
    <polygon points="150,110 205,80 260,110 205,140" fill="url(#primaryGrad)" filter="url(#glow)" />
    <!-- Cap Base -->
    <path d="M 175 125 L 175 145 A 30 15 0 0 0 235 145 L 235 125" fill="none" stroke="url(#primaryGrad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />
    <!-- Tassel -->
    <path d="M 205 110 L 250 135 L 250 160" fill="none" stroke="#d946ef" stroke-width="4" stroke-linecap="round" />
    <circle cx="250" cy="162" r="4" fill="#d946ef" />
  </g>

  <!-- Title Text -->
  <text x="250" y="380" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="44" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="2">SAMS</text>
  
  <!-- Subtitle -->
  <text x="250" y="420" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="500" fill="#94a3b8" text-anchor="middle" letter-spacing="1">Student Application Management System</text>
</svg>
