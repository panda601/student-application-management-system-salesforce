<template>
    <div class="slds-card sld-theme_default card-container slds-p-around_medium">
        <h2 class="section-title slds-m-bottom_medium">Application Lifecycle Timeline</h2>
        
        <div class="timeline-container">
            <div class="slds-grid slds-grid_align-spread timeline-grid">
                
                <!-- Step 1: Created -->
                <div class={step1Class}>
                    <div class="step-circle">1</div>
                    <div class="step-label">Submitted</div>
                    <div class="step-detail">New Application logged</div>
                </div>

                <!-- Step 2: Paid -->
                <div class={step2Class}>
                    <div class="step-circle">2</div>
                    <div class="step-label">Deposit Logged</div>
                    <div class="step-detail">Min deposit fee verified</div>
                </div>

                <!-- Step 3: Review -->
                <div class={step3Class}>
                    <div class="step-circle">3</div>
                    <div class="step-label">Under Evaluation</div>
                    <div class="step-detail">Manager review in progress</div>
                </div>

                <!-- Step 4: Approved -->
                <div class={step4Class}>
                    <div class="step-circle">4</div>
                    <div class="step-label">{decisionLabel}</div>
                    <div class="step-detail">{decisionDetail}</div>
                </div>

            </div>
            
            <!-- Connection Line Background -->
            <div class="connection-line">
                <div class="connection-fill" style={connectionStyle}></div>
            </div>
        </div>
    </div>
</template>
