<template>
    <lightning-card title="SAMS Einstein AI Insights" icon-name="utility:einstein">
        <div class="sams-container">
            <template if:true={isLoaded}>
                <div class="ai-card">
                    <!-- Gauge ring representation -->
                    <div class="gauge-section">
                        <div class="gauge-ring">
                            <span class={scoreColorClass}>{score}%</span>
                        </div>
                        <p class="gauge-label">Approval Probability</p>
                    </div>

                    <!-- Risk and Actions -->
                    <div class="insights-section slds-m-top_medium">
                        <div class="insight-row">
                            <span class="lbl">Predicted Risk Level:</span>
                            <span class={riskClass}>{risk}</span>
                        </div>
                        
                        <div class="missing-docs slds-m-top_medium">
                            <p class="lbl slds-m-bottom_x-small">Recommended Action Checklist:</p>
                            <template if:true={missingDocs.length}>
                                <ul>
                                    <template for:each={missingDocs} for:item="doc">
                                        <li key={doc} class="doc-item">
                                            <lightning-icon icon-name="utility:warning" size="x-small" variant="warning" class="slds-m-right_xx-small"></lightning-icon>
                                            <span>Collect: {doc}</span>
                                        </li>
                                    </template>
                                </ul>
                            </template>
                            <template if:false={missingDocs.length}>
                                <div class="all-docs-verified">
                                    <lightning-icon icon-name="utility:check" size="x-small" variant="success" class="slds-m-right_xx-small"></lightning-icon>
                                    <span class="text-green">All basic application checks verified!</span>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
            <template if:false={isLoaded}>
                <lightning-spinner alternative-text="Querying SAMS AI..." size="medium"></lightning-spinner>
            </template>
        </div>
    </lightning-card>
</template>
