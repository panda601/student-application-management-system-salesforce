<template>
    <div class="slds-card sld-theme_default card-container slds-p-around_medium">
        <h2 class="section-title slds-m-bottom_medium">Document Checklist &amp; Verification</h2>
        
        <div class="document-list">
            <template for:each={documents} for:item="doc">
                <div key={doc.name} class="doc-row slds-p-around_small slds-m-bottom_small">
                    <div class="slds-grid slds-grid_vertical-align-center slds-wrap">
                        
                        <!-- Doc Info -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_5-of-12">
                            <div class="doc-name">{doc.label}</div>
                            <div class="doc-desc">{doc.desc}</div>
                        </div>

                        <!-- Status Badge -->
                        <div class="slds-col slds-size_1-of-2 slds-medium-size_3-of-12">
                            <span class={doc.statusClass}>{doc.status}</span>
                        </div>

                        <!-- Upload / Actions -->
                        <div class="slds-col slds-size_1-of-2 slds-medium-size_4-of-12 slds-text-align_right">
                            <template if:true={doc.hasFile}>
                                <lightning-button 
                                    label="Preview" 
                                    icon-name="utility:preview" 
                                    size="small" 
                                    onclick={handlePreview} 
                                    data-name={doc.name}
                                    class="slds-m-right_x-small">
                                </lightning-button>
                            </template>
                            
                            <lightning-file-upload
                                label="Upload"
                                name={doc.name}
                                accept={acceptedFormats}
                                record-id={recordId}
                                onuploadfinished={handleUploadFinished}
                                class="inline-upload">
                            </lightning-file-upload>
                        </div>

                    </div>
                </div>
            </template>
        </div>
    </div>
</template>
